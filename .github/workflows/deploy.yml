name: Deploy portfolio to S3

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar build
        run: npm run build

      - name: Conectar na AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::453090112719:role/DeployDraEvelyneBorgesDeMattosToS3
          aws-region: us-east-1

      - name: Enviar para o S3
        run: aws s3 sync ./dist s3://draevelyneborgesdemattos --delete